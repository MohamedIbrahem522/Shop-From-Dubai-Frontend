<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | Shop from Dubai</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <img src="./images/LOGO.png" alt="Shop from Dubai">
    </div>
    <h2>تسجيل الدخول</h2>
    <p class="login-sub">لوحة تحكم Shop from Dubai</p>
    <form id="loginForm">
      <div class="login-input-group">
        <input type="text" id="loginUser" placeholder="البريد الإلكتروني / اسم المستخدم" required>
        <i class="fas fa-user"></i>
      </div>
      <div class="login-input-group">
        <input type="password" id="loginPass" placeholder="كلمة المرور" required>
        <i class="fas fa-lock"></i>
      </div>
      <p id="loginError" class="login-error"></p>
      <button type="submit">دخول <i class="fas fa-arrow-left"></i></button>
    </form>
  </div>
</div>

<div id="adminApp" class="admin-app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">
        <img src="./images/LOGO.png" alt="Shop from Dubai">
      </div>
      <div>
        <div class="sidebar-brand-name">Shop from Dubai</div>
        <div class="sidebar-brand-sub">لوحة الإدارة</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-link active" data-page="dashboard"><i class="fas fa-chart-pie"></i><span>الإحصائيات</span></a>
      <a class="sidebar-link" data-page="products"><i class="fas fa-box"></i><span>المنتجات</span></a>
      <a class="sidebar-link" data-page="categories"><i class="fas fa-tags"></i><span>الأقسام</span></a>
      <a class="sidebar-link" data-page="testimonials"><i class="fas fa-star"></i><span>الآراء</span></a>
    </nav>
    <a href="./index.html" target="_blank" class="sidebar-view-site"><i class="fas fa-external-link-alt"></i><span>عرض الموقع</span></a>
    <div class="sidebar-actions">
      <a class="sidebar-link sidebar-settings-link" data-page="settings"><i class="fas fa-cog"></i><span>الإعدادات</span></a>
      <button id="logoutBtn" class="sidebar-logout"><i class="fas fa-sign-out-alt"></i><span>خروج</span></button>
    </div>
  </aside>

  <main class="main-area">
    <header class="main-header">
      <div class="header-left">
        <div class="header-brand">
          <img src="./images/LOGO.png" alt="" class="header-logo-img">
          <span class="header-brand-text">Shop from Dubai</span>
        </div>
        <span class="header-sep">|</span>
        <h1 id="pageTitle">الإحصائيات</h1>
      </div>
      <div class="header-user">
        <img src="favicon.png" class="header-user-avatar">
        <span id="headerUserName">Admin</span>
      </div>
    </header>

    <div class="page-content" id="pageContent">
    </div>
  </main>
</div>

<div id="adminLightbox" class="admin-lightbox">
  <button class="admin-lightbox-close">&times;</button>
  <img id="adminLightboxImg" src="" alt="تقييم عميل">
</div>
<script src="api.js"></script>
<script src="admin.js"></script>
</body>
</html>
